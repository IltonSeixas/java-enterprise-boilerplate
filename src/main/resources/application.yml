server:
  port: ${SERVER_PORT:3000}
  error:
    include-message: never
    include-stacktrace: never

spring:
  application:
    name: java-enterprise-boilerplate
  threads:
    virtual:
      enabled: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:inmemory}
  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL:redis://localhost:6379}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT_MS:2000}ms
      timeout: ${REDIS_COMMAND_TIMEOUT_MS:2000}ms
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: false
  # The postgres profile re-enables these via the override below. Without this
  # exclusion, spring-boot-starter-data-jpa on the classpath (required for the
  # postgres profile) triggers DataSource/Hikari autoconfiguration even when no
  # datasource is configured, failing startup under the default inmemory profile.
  autoconfigure:
    exclude:
      - org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
      - org.springframework.boot.jdbc.autoconfigure.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.jdbc.autoconfigure.DataSourceInitializationAutoConfiguration
      - org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration
      - org.springframework.boot.data.jpa.autoconfigure.DataJpaRepositoriesAutoConfiguration
      - org.springframework.boot.flyway.autoconfigure.FlywayAutoConfiguration

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,redis
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY:0.1}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

grpc:
  server:
    port: ${GRPC_PORT:50051}

jwt:
  private-key-path: ${JWT_PRIVATE_KEY_PATH:jwt_private.pem}
  public-key-path: ${JWT_PUBLIC_KEY_PATH:jwt_public.pem}
  access-token-expiry-minutes: ${JWT_ACCESS_EXPIRY_MINUTES:15}
  refresh-token-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:7}

security:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

app:
  rate-limit:
    # Only enable when running behind a trusted reverse proxy that overwrites
    # X-Forwarded-For (never appends). Otherwise the header is attacker-controlled.
    trust-forwarded-headers: ${RATE_LIMIT_TRUST_FORWARDED_HEADERS:false}

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.enterprise.boilerplate: ${LOGGING_LEVEL_APP:INFO}
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'

resilience4j:
  # CircuitBreaker must wrap Retry (not the reverse, which is the library's
  # default) so that a transient failure retried successfully counts as one
  # success, not as several individual failures inflating the failure rate.
  circuitbreaker:
    circuitBreakerAspectOrder: 1
    instances:
      redis:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
      postgres:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
  retry:
    retryAspectOrder: 2
    instances:
      redis-read:
        max-attempts: 3
        wait-duration: 100ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      postgres-read:
        max-attempts: 3
        wait-duration: 100ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2

---
spring:
  config:
    activate:
      on-profile: postgres
  autoconfigure:
    exclude: []
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/boilerplate}
    username: ${SPRING_DATASOURCE_USERNAME:boilerplate}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_CONNECT_TIMEOUT_MS:30000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoint:
    health:
      group:
        readiness:
          include: readinessState,redis,db
