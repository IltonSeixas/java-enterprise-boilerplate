server:
  port: ${SERVER_PORT:3000}
  error:
    include-message: never
    include-stacktrace: never

spring:
  application:
    name: java-enterprise-boilerplate
  threads:
    virtual:
      enabled: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:inmemory}
  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL:redis://localhost:6379}
      connect-timeout: 2s
      timeout: 2s
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

grpc:
  server:
    port: ${GRPC_PORT:50051}

jwt:
  secret: ${JWT_SECRET:change-this-secret-in-production-min-32-chars!!}
  access-token-expiry-minutes: ${JWT_ACCESS_EXPIRY_MINUTES:15}
  refresh-token-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:7}

security:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.enterprise.boilerplate: ${LOGGING_LEVEL_APP:INFO}
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/boilerplate}
    username: ${SPRING_DATASOURCE_USERNAME:boilerplate}
    password: ${SPRING_DATASOURCE_PASSWORD:boilerplate}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  flyway:
    enabled: true
    locations: classpath:db/migration
